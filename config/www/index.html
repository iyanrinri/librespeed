<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no" />
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script type="text/javascript" src="speedtest.js"></script>
    <script type="text/javascript">
        function I(i) { return document.getElementById(i); }
        //INITIALIZE SPEEDTEST
        var s = new Speedtest(); //create speedtest object
        s.setParameter("telemetry_level", "basic"); //enable telemetry
        s.setParameter("getIp_ispInfo", true); //enable ISP info
        s.setParameter("getIp_ispInfo_distance", "km"); //enable distance (optional)

        // Tuning for Gigabit speeds
        s.setParameter("garbagePhp_chunkSize", 1000); // Increase download chunk size
        s.setParameter("emptyPhp_chunkSize", 1000); // Increase upload chunk size
        s.setParameter("xhr_dlMultistream", 100); // Increase download streams (default 6)
        s.setParameter("xhr_ulMultistream", 100); // Increase upload streams (default 3)

        // Colors matching modern aesthetic
        var meterBk = "#1a1a2e";
        var dlColor = "#00ffcc",
            ulColor = "#ff00ff";
        var progColor = "#22223b";

        //CODE FOR GAUGES
        function drawMeter(c, amount, bk, fg, progress, prog) {
            var ctx = c.getContext("2d");
            var dp = window.devicePixelRatio || 1;
            var cw = c.clientWidth * dp, ch = c.clientHeight * dp;
            var sizScale = ch * 0.0055;
            if (c.width == cw && c.height == ch) {
                ctx.clearRect(0, 0, cw, ch);
            } else {
                c.width = cw;
                c.height = ch;
            }

            var centerX = c.width / 2;
            var centerY = c.height - 40 * sizScale;
            var radius = c.height / 1.8 - 10 * sizScale;
            var startAngle = -Math.PI * 1.2;
            var endAngle = Math.PI * 0.2;
            var totalAngle = endAngle - startAngle;

            // Draw background track
            ctx.beginPath();
            ctx.strokeStyle = bk;
            ctx.lineWidth = 12 * sizScale;
            ctx.lineCap = "round";
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.stroke();

            // Draw active track with glow
            ctx.beginPath();
            ctx.strokeStyle = fg;
            ctx.lineWidth = 12 * sizScale;
            ctx.lineCap = "round";
            ctx.shadowBlur = 15 * sizScale;
            ctx.shadowColor = fg;
            ctx.arc(centerX, centerY, radius, startAngle, startAngle + amount * totalAngle);
            ctx.stroke();

            // Reset shadow
            ctx.shadowBlur = 0;
        }
        function mbpsToAmount(s) {
            return 1 - (1 / (Math.pow(1.3, Math.sqrt(s))));
        }
        function format(d) {
            d = Number(d);
            if (d < 10) return d.toFixed(2);
            if (d < 100) return d.toFixed(1);
            return d.toFixed(0);
        }

        //UI CODE
        var uiData = null;
        function startStop() {
            if (s.getState() == 3) {
                //speedtest is running, abort
                s.abort();
                data = null;
                I("startBtn").classList.remove("running");
                I("startBtnText").textContent = "GO";
                initUI();
            } else {
                //test is not running, begin
                I("startBtn").classList.add("running");
                I("startBtnText").textContent = "STOP";
                I("shareArea").style.display = "none";
                s.onupdate = function (data) {
                    uiData = data;
                };
                s.onend = function (aborted) {
                    I("startBtn").classList.remove("running");
                    I("startBtnText").textContent = "AGAIN";
                    updateUI(true);
                    if (!aborted) {
                        try {
                            var testId = uiData.testId;
                            if (testId != null) {
                                var shareURL = window.location.href.substring(0, window.location.href.lastIndexOf("/")) + "/results/?id=" + testId;
                                I("resultsImg").src = shareURL;
                                I("resultsURL").value = shareURL;
                                I("testId").innerHTML = testId;
                                I("shareArea").style.display = "flex";
                            }
                        } catch (e) { }
                    }
                };
                s.start();
            }
        }
        function updateUI(forced) {
            if (!forced && s.getState() != 3) return;
            if (uiData == null) return;
            var status = uiData.testState;
            var clientIp = uiData.clientIp;
            var ispInfo = uiData.ispInfo;

            // Handle JSON response format from getIP.php
            if (typeof clientIp === 'object' && clientIp !== null) {
                if (clientIp.rawIspInfo && clientIp.rawIspInfo.as_name) {
                    ispInfo = clientIp.rawIspInfo.as_name;
                } else if (clientIp.processedString) {
                    var parts = clientIp.processedString.split(" - ");
                    if (parts.length > 1) ispInfo = parts[1];
                }
                clientIp = clientIp.processedString ? clientIp.processedString.split(" - ")[0] : "";
            } else if (typeof clientIp === 'string') {
                if (clientIp.startsWith("{")) {
                    try {
                        var parsed = JSON.parse(clientIp);
                        if (parsed.rawIspInfo && parsed.rawIspInfo.as_name) {
                            ispInfo = parsed.rawIspInfo.as_name;
                        } else if (parsed.processedString) {
                            var parts = parsed.processedString.split(" - ");
                            if (parts.length > 1) ispInfo = parts[1];
                        }
                        clientIp = parsed.processedString ? parsed.processedString.split(" - ")[0] : "";
                    } catch (e) { }
                } else if (clientIp.indexOf(" - ") > -1) {
                    var parts = clientIp.split(" - ");
                    clientIp = parts[0];
                    ispInfo = parts[1];
                }
            }

            I("ip").textContent = clientIp || "";
            if (ispInfo) I("isp").textContent = ispInfo;
            else I("isp").textContent = "Unknown ISP";

            I("dlText").textContent = (status == 1 && uiData.dlStatus == 0) ? "..." : format(uiData.dlStatus);
            drawMeter(I("dlMeter"), mbpsToAmount(Number(uiData.dlStatus * (status == 1 ? oscillate() : 1))), meterBk, dlColor, Number(uiData.dlProgress), progColor);
            I("ulText").textContent = (status == 3 && uiData.ulStatus == 0) ? "..." : format(uiData.ulStatus);
            drawMeter(I("ulMeter"), mbpsToAmount(Number(uiData.ulStatus * (status == 3 ? oscillate() : 1))), meterBk, ulColor, Number(uiData.ulProgress), progColor);
            I("pingText").textContent = format(uiData.pingStatus);
            I("jitText").textContent = format(uiData.jitterStatus);
        }
        function oscillate() {
            return 1 + 0.02 * Math.sin(Date.now() / 100);
        }
        window.requestAnimationFrame = window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || window.msRequestAnimationFrame || (function (callback, element) { setTimeout(callback, 1000 / 60); });
        function frame() {
            requestAnimationFrame(frame);
            updateUI();
        }
        frame(); //start frame loop
        function initUI() {
            drawMeter(I("dlMeter"), 0, meterBk, dlColor, 0);
            drawMeter(I("ulMeter"), 0, meterBk, ulColor, 0);
            I("dlText").textContent = "";
            I("ulText").textContent = "";
            I("pingText").textContent = "";
            I("jitText").textContent = "";
            I("ip").textContent = "";
            I("isp").textContent = "";
        }
    </script>
    <style type="text/css">
        :root {
            --bg: #0f1015;
            --panel-bg: #16171f;
            --text: #ffffff;
            --text-muted: #8e8e99;
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --border: #2a2b36;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .brand {
            position: absolute;
            top: 30px;
            left: 40px;
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: inline-block;
        }

        #testWrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stat-group.right {
            align-items: flex-end;
        }

        .stat-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-label .icon {
            width: 16px;
            height: 16px;
        }

        .stat-value-container {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 400;
            line-height: 1;
        }

        .stat-value:empty::before {
            content: "--";
            color: rgba(255, 255, 255, 0.1);
        }

        .stat-unit {
            font-size: 1em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .action-area {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0 40px 0;
        }

        /* The GO Button */
        .start-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: transparent;
            border: 4px solid var(--primary);
            color: var(--primary);
            font-size: 2em;
            font-weight: 300;
            cursor: pointer;
            outline: none;
            position: relative;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2), inset 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.4), inset 0 0 30px rgba(0, 255, 204, 0.4);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .start-btn.running {
            border-color: #ff3b30;
            color: #ff3b30;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.2), inset 0 0 20px rgba(255, 59, 48, 0.2);
        }

        .start-btn.running:hover {
            background: rgba(255, 59, 48, 0.1);
            box-shadow: 0 0 40px rgba(255, 59, 48, 0.4), inset 0 0 30px rgba(255, 59, 48, 0.4);
        }

        /* Rings animation */
        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .ring-1 {
            width: 160px;
            height: 160px;
        }

        .ring-2 {
            width: 200px;
            height: 200px;
        }

        .ring-3 {
            width: 240px;
            height: 240px;
        }

        .meters-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 250px;
            height: 180px;
        }

        .gauge-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .gauge-container .value-container {
            position: absolute;
            bottom: 20px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gauge-container .stat-value {
            font-size: 2.2em;
            font-weight: 300;
        }

        .gauge-label {
            font-size: 0.9em;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }

        .bottom-info {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            color: var(--text-muted);
            background: var(--panel-bg);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .bottom-info .info-row {
            display: flex;
            gap: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-item .icon {
            color: var(--primary);
        }

        .info-val {
            color: var(--text);
            font-weight: 500;
        }

        #shareArea {
            margin-top: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 600px;
        }

        #shareArea h3 {
            margin-top: 0;
            font-weight: 500;
        }

        .share-input-wrapper {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-bottom: 20px;
        }

        #resultsURL {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
            outline: none;
        }

        #resultsURL:focus {
            border-color: var(--primary);
        }

        #resultsImg {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        @media (max-width: 700px) {
            .brand {
                top: 20px;
                left: 20px;
                font-size: 1.2em;
            }

            #testWrapper {
                padding: 10px;
                margin-top: 40px;
            }

            .top-stats {
                padding-top: 10px;
                margin-bottom: 20px;
            }

            .meters-row {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                margin-top: 10px;
                margin-bottom: 20px;
            }

            .gauge-container {
                width: 220px;
                height: 160px;
            }

            .gauge-container .stat-value {
                font-size: 1.8em;
            }

            .bottom-info {
                padding: 15px;
                margin-top: 20px;
            }

            .bottom-info .info-row {
                flex-direction: column;
                gap: 12px;
                align-items: center;
            }
        }
    </style>
    <title>SpeedTest by BroMN</title>
</head>

<body>

    <div class="brand">
        <div class="brand-icon"></div>
        BROMN
    </div>

    <div id="testWrapper">
        <div class="meters-row">
            <div class="gauge-container">
                <canvas id="dlMeter"></canvas>
                <div class="value-container">
                    <div id="dlText" class="stat-value"></div>
                    <div class="stat-unit">Mbps</div>
                </div>
                <div class="gauge-label">Download</div>
            </div>
            <div class="gauge-container">
                <canvas id="ulMeter"></canvas>
                <div class="value-container">
                    <div id="ulText" class="stat-value"></div>
                    <div class="stat-unit">Mbps</div>
                </div>
                <div class="gauge-label">Upload</div>
            </div>
        </div>

        <div class="top-stats">
            <div class="stat-group">
                <div class="stat-label">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    Ping
                </div>
                <div class="stat-value-container">
                    <div id="pingText" class="stat-value"></div>
                    <div class="stat-unit">ms</div>
                </div>
            </div>
            <div class="stat-group right">
                <div class="stat-label">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
                        <path d="M21 3v5h-5"></path>
                    </svg>
                    Jitter
                </div>
                <div class="stat-value-container">
                    <div id="jitText" class="stat-value"></div>
                    <div class="stat-unit">ms</div>
                </div>
            </div>
        </div>

        <div class="action-area">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <button id="startBtn" class="start-btn" onclick="startStop()">
                <span id="startBtnText">GO</span>
            </button>
        </div>

        <div class="bottom-info">
            <div class="info-row">
                <div class="info-item">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                        <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                        <line x1="6" y1="6" x2="6.01" y2="6"></line>
                        <line x1="6" y1="18" x2="6.01" y2="18"></line>
                    </svg>
                    <span id="ip" class="info-val"></span>
                </div>
                <div class="info-item">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                        </path>
                    </svg>
                    <span id="isp" class="info-val"></span>
                </div>
            </div>
        </div>

        <div id="shareArea">
            <h3>Share Your Result</h3>
            <div class="share-input-wrapper">
                <input type="text" id="resultsURL" readonly onclick="this.select();document.execCommand('copy');" />
            </div>
            <img id="resultsImg" src="" alt="Speedtest Result" />
        </div>

    </div>

    <script type="text/javascript">setTimeout(function () { initUI() }, 100);</script>
</body>

</html>
